services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/debt_destroyer
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=512}
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - backend_logs:/app/logs

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: debt_destroyer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command:
      [
        "postgres",
        "-c",
        "max_connections=100",
        "-c",
        "shared_buffers=256MB",
        "-c",
        "work_mem=4MB",
        "-c",
        "maintenance_work_mem=64MB",
      ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d debt_destroyer"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-bookworm
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--save",
        "60",
        "1000",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  backend_logs:
